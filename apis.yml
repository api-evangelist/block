  - type: Features
    data:
      - name: Payment Processing
        description: >-
          Accept card-present and card-not-present payments using Square hardware,
          web, or mobile SDKs with OAuth 2.0 or access token authentication.
      - name: Order Management
        description: >-
          Create, update, and fulfill orders with line items, discounts, taxes,
          and service charges across online and in-person channels.
      - name: Catalog Management
        description: >-
          Manage a unified product catalog with items, variations, modifiers,
          categories, taxes, and discounts synchronized across all locations.
      - name: Customer Engagement
        description: >-
          Build customer profiles, loyalty programs, gift cards, and marketing
          campaigns to drive repeat business and customer retention.
      - name: Multi-Location Support
        description: >-
          Manage multiple business locations with location-specific inventory,
          pricing, staff permissions, and reporting.
      - name: Webhook Events
        description: >-
          Subscribe to real-time webhook events for payments, orders, inventory
          changes, customer activity, and subscription lifecycle events.
      - name: Sandbox Environment
        description: >-
          Full sandbox environment with test card numbers, merchant accounts,
          and simulated hardware for development and testing.
  - type: UseCases
    data:
      - name: Point of Sale Integration
        description: >-
          Retailers and restaurants build custom POS applications using Square's
          payment, catalog, and order APIs.
      - name: eCommerce Checkout
        description: >-
          Online stores integrate Square's Web Payments SDK and Orders API to
          accept payments and manage fulfillment.
      - name: Marketplace Payments
        description: >-
          Multi-seller marketplaces use Square Connect to route payments to
          sellers and manage fees through the Payouts API.
      - name: Subscription Billing
        description: >-
          SaaS and service businesses use Square Subscriptions API for automated
          recurring billing and invoice management.
      - name: Loyalty and Rewards
        description: >-
          Businesses implement custom loyalty programs using the Loyalty API to
          track points, tiers, and reward redemptions.
  - type: Integrations
    data:
      - name: WooCommerce
        description: >-
          Official Square extension for WooCommerce synchronizes inventory,
          products, and payments between WordPress stores and Square.
      - name: BigCommerce
        description: >-
          Square integration for BigCommerce enables omnichannel selling with
          synchronized catalog and unified payment processing.
      - name: Xero
        description: >-
          Square-Xero integration automatically syncs sales transactions and
          payments to Xero accounting for reconciliation.
      - name: QuickBooks
        description: >-
          Square connector for QuickBooks Online syncs sales, refunds, and fees
          to QuickBooks for financial reporting.
