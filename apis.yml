name: Block
description: >-
  Block, Inc. is a global technology company building economic empowerment tools
  through a family of products including Square (commerce and payments), Cash App
  (personal finance and investing), Afterpay (buy now pay later), TIDAL (music
  streaming), and Spiral (open-source Bitcoin development). The Square API enables
  developers to build commerce applications with payment processing, order management,
  catalog, customer engagement, and business operations capabilities.
