    name: Square API
    description: >-
      RESTful API for building commerce applications on the Square platform. Provides
      payment processing, order management, catalog management, customer profiles,
      loyalty programs, invoicing, and merchant operations. Supports OAuth 2.0 and
      personal access token authentication. Available in sandbox and production environments.
