name: Square API
description: >-
  Square API for payment processing, commerce, customer management, and
  business operations on the Square platform.
version: 2026-01-22
baseUrl: https://connect.squareup.com/v2
auth:
  type: bearer
  description: Bearer token or OAuth 2.0 access token
operations:
  - operationId: list-payments
    method: GET
    path: /payments
    summary: List Payments
    description: Retrieves a list of payments taken by the account.
    tags:
      - Payments
  - operationId: create-payment
    method: POST
    path: /payments
    summary: Create Payment
    description: Creates a payment using the provided source.
    tags:
      - Payments
  - operationId: get-payment
    method: GET
    path: /payments/{payment_id}
    summary: Get Payment
    description: Retrieves details for a specific payment.
    tags:
      - Payments
  - operationId: create-order
    method: POST
    path: /orders
    summary: Create Order
    description: Creates a new order that can include information on products for purchase.
    tags:
      - Orders
  - operationId: list-catalog
    method: GET
    path: /catalog/list
    summary: List Catalog
    description: Returns a list of all CatalogObjects of the specified types.
    tags:
      - Catalog
  - operationId: list-customers
    method: GET
    path: /customers
    summary: List Customers
    description: Lists customer profiles associated with a Square account.
    tags:
      - Customers
  - operationId: create-customer
    method: POST
    path: /customers
    summary: Create Customer
    description: Creates a new customer for a business.
    tags:
      - Customers
  - operationId: list-locations
    method: GET
    path: /locations
    summary: List Locations
    description: Provides details about all of the seller's locations.
    tags:
      - Merchants
